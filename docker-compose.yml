# MCP Servers - Unified Docker Compose
# All bioinformatics MCP servers consolidated
# Use profiles to enable/disable services via COMPOSE_PROFILES env var

services:
  # ===========================================
  # BRAVE SEARCH MCP SERVER
  # Web search and news intelligence
  # ===========================================
  brave-search-mcp:
    build:
      context: ./brave-search-mcp-server
      dockerfile: Dockerfile
    container_name: brave-search-mcp-server
    restart: unless-stopped
    profiles:
      - brave
      - all
    cap_drop:
      - all
    deploy:
      restart_policy:
        condition: any
        delay: 5s
    environment:
      - BRAVE_API_KEY=${BRAVE_API_KEY}
      # Wrapper uses stdio internally:
      - BRAVE_MCP_PORT=7000
      - BRAVE_MCP_HOST=0.0.0.0
      - BRAVE_MCP_LOG_LEVEL=info
    init: true
    ports:
      - "7000:7000"
    security_opt:
      - no-new-privileges:true
    networks:
      - mcp-network
      - mcp-network-llm

  # ===========================================
  # GNOMAD MCP SERVER
  # Genomic variant population data
  # ===========================================
  gnomad-mcp:
    build:
      context: ./gnomad-mcp
      dockerfile: Dockerfile
    container_name: gnomad-mcp
    restart: unless-stopped
    profiles:
      - gnomad
      - all
    environment:
      - FASTMCP_TRANSPORT=sse
      - FASTMCP_PORT=7001
      - FASTMCP_HOST=0.0.0.0
    ports:
      - "7001:7001"
    networks:
      - mcp-network

  # ===========================================
  # BIO LOCAL MCP SERVER
  # Local bioinformatics engine with bcftools
  # ===========================================
  bio-local-mcp:
    build:
      context: ./bio_local
      dockerfile: Dockerfile
    container_name: bio-local-mcp
    restart: unless-stopped
    profiles:
      - biolocal
      # all: excluded — ./bio_local has no Dockerfile/content yet
    environment:
      - FASTMCP_TRANSPORT=sse
      - FASTMCP_PORT=7002
      - FASTMCP_HOST=0.0.0.0
      - GENOME_DATA_PATH=/data/genomes
    volumes:
      - ${GENOME_DATA_PATH}:/data/genomes:ro
    ports:
      - "7002:7002"
    networks:
      - mcp-network

  # ===========================================
  # GENOME MCP SERVER
  # ClinVar genomic data queries
  # ===========================================
  genome-mcp:
    build:
      context: ./genome_mcp
      dockerfile: Dockerfile
    container_name: genome-mcp
    restart: unless-stopped
    profiles:
      - genome
      - all
    environment:
      - PYTHONUNBUFFERED=1
      - PORT=7003
    ports:
      - "7003:7003"
    networks:
      - mcp-network

  # ===========================================
  # PAPERSCRAPER MCP SERVER
  # Literature and research paper search
  # ===========================================
  paperscraper-mcp:
    build:
      context: ./paperscraper_mcp
      dockerfile: Dockerfile
    container_name: paperscraper-mcp
    restart: unless-stopped
    profiles:
      - paperscraper
      - all
    environment:
      - FASTMCP_TRANSPORT=sse
      - FASTMCP_PORT=7004
      - FASTMCP_HOST=0.0.0.0
    ports:
      - "7004:7004"
    networks:
      - mcp-network

  # ===========================================
  # NCBI DATASETS MCP SERVER
  # NCBI genomic datasets queries
  # ===========================================
  ncbi-datasets-mcp:
    build:
      context: ./NCBI-Datasets-MCP-Server
      dockerfile: Dockerfile
    container_name: ncbi-datasets-mcp
    restart: unless-stopped
    profiles:
      - ncbi
      - all
    environment:
      - NCBI_API_KEY=${NCBI_API_KEY}
      - MCP_TRANSPORT=http
      - MCP_PORT=7005
    ports:
      - "7005:7005"
    networks:
      - mcp-network

  # ===========================================
  # FILESYSTEM MCP SERVER
  # File system access for data directory
  # ===========================================
  filesystem-mcp:
    build:
      context: ./rust-mcp-filesystem
      dockerfile: Dockerfile
    container_name: filesystem-mcp
    restart: unless-stopped
    profiles:
      - filesystem
    entrypoint: ["sleep", "infinity"]
    volumes:
      - ${WORKSPACE_PATH}:/workspace:ro
    networks:
      - mcp-network
      - mcp-network-llm

  # ===========================================
  # MCP DB SERVER
  # PostgreSQL database connector
  # ===========================================
  mcp-db-server:
    build:
      context: ./mcp-db-server
      dockerfile: Dockerfile
    container_name: mcp-db-server
    restart: unless-stopped
    profiles:
      - db
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - PYTHONUNBUFFERED=1
    volumes:
      - ./mcp-db-server/data:/data
      - ./mcp-db-server/config:/app/config:ro
    stdin_open: true
    tty: true
    healthcheck:
      test: [ "CMD", "python", "-c", "import asyncio; import sys; sys.path.insert(0, 'app'); from db import DatabaseManager; dm = DatabaseManager(); print('OK' if asyncio.run(dm.test_connection()) else 'FAIL')" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - mcp-network

  # ===========================================
  # GHOSTLABS MCP SERVERS
  # AI product suite tools
  # ===========================================

  # Phantom — Lead generation & email verification
  ghostlabs-phantom-mcp:
    build:
      context: ./ghostlabs-phantom-mcp
      dockerfile: Dockerfile
    container_name: ghostlabs-phantom-mcp
    restart: unless-stopped
    profiles:
      - ghostlabs
      - phantom
      - all
    environment:
      - PHANTOM_API_URL=${PHANTOM_API_URL:-http://phantom-backend:8000/api}
      - PHANTOM_API_KEY=${PHANTOM_API_KEY:-}
      - FASTMCP_TRANSPORT=sse
      - FASTMCP_PORT=7010
      - FASTMCP_HOST=0.0.0.0
    ports:
      - "7010:7010"
    networks:
      - mcp-network
      - mcp-network-llm

  # Whisper — Business intelligence & data queries
  ghostlabs-whisper-mcp:
    build:
      context: ./ghostlabs-whisper-mcp
      dockerfile: Dockerfile
    container_name: ghostlabs-whisper-mcp
    restart: unless-stopped
    profiles:
      - ghostlabs
      - whisper
      - all
    environment:
      - WHISPER_API_URL=${WHISPER_API_URL:-http://whisper-backend:8000/api}
      - WHISPER_API_KEY=${WHISPER_API_KEY:-}
      - FASTMCP_TRANSPORT=sse
      - FASTMCP_PORT=7011
      - FASTMCP_HOST=0.0.0.0
    ports:
      - "7011:7011"
    networks:
      - mcp-network
      - mcp-network-llm

  # Shroud — Security & compliance
  ghostlabs-shroud-mcp:
    build:
      context: ./ghostlabs-shroud-mcp
      dockerfile: Dockerfile
    container_name: ghostlabs-shroud-mcp
    restart: unless-stopped
    profiles:
      - ghostlabs
      - shroud
      - all
    environment:
      - SHROUD_API_URL=${SHROUD_API_URL:-http://shroud-backend:8000/api}
      - SHROUD_API_KEY=${SHROUD_API_KEY:-}
      - FASTMCP_TRANSPORT=sse
      - FASTMCP_PORT=7012
      - FASTMCP_HOST=0.0.0.0
    ports:
      - "7012:7012"
    networks:
      - mcp-network
      - mcp-network-llm

  # Specter — Adversarial strategy analysis
  ghostlabs-specter-mcp:
    build:
      context: ./ghostlabs-specter-mcp
      dockerfile: Dockerfile
    container_name: ghostlabs-specter-mcp
    restart: unless-stopped
    profiles:
      - ghostlabs
      - specter
      - all
    environment:
      - SPECTER_API_URL=${SPECTER_API_URL:-http://specter-backend:8000/api}
      - SPECTER_API_KEY=${SPECTER_API_KEY:-}
      - FASTMCP_TRANSPORT=sse
      - FASTMCP_PORT=7013
      - FASTMCP_HOST=0.0.0.0
    ports:
      - "7013:7013"
    networks:
      - mcp-network
      - mcp-network-llm

  # Skills Engine — Shared skill discovery & loading
  ghostlabs-skills-mcp:
    build:
      context: ./ghostlabs-skills-mcp
      dockerfile: Dockerfile
    container_name: ghostlabs-skills-mcp
    restart: unless-stopped
    profiles:
      - ghostlabs
      - skills
      - all
    environment:
      - SKILLS_API_URL=${SKILLS_API_URL:-http://ghostlabs-backend:8000/api}
      - FASTMCP_TRANSPORT=sse
      - FASTMCP_PORT=7014
      - FASTMCP_HOST=0.0.0.0
    ports:
      - "7014:7014"
    networks:
      - mcp-network
      - mcp-network-llm

networks:
  mcp-network:
    name: mcp-network
    external: true
  mcp-network-llm:
    name: mcp-network-llm
    external: true
